[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
evm_version = "paris"

# Avalanche C-Chain fork testing
[profile.default.rpc_endpoints]
avalanche = "${AVAX_RPC_URL}"
fuji = "https://api.avax-test.network/ext/bc/C/rpc"

# Optimizer for smaller deployment
[profile.default.optimizer_details]
runs = 200
